name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            stream-server/package-lock.json

      - name: Frontend install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Stream server install
        working-directory: stream-server
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend install and Ruff
        working-directory: backend
        run: |
          pip install -e .
          pip install ruff
          ruff check app config.py
          python -m compileall -q app config.py
